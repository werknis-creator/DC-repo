name: Dreamcast Build - Official Example

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/ps2dev/ps2dev:latest

    steps:
    - uses: actions/checkout@v4

    - name: Install KallistiOS
      run: |
        apt-get update
        apt-get install -y git make wget
        
    - name: Clone and Build Example
      run: |
        cd /tmp
        git clone --depth 1 https://github.com/KallistiOS/KallistiOS.git
        cd KallistiOS
        
        # Skompiluj prosty przykład hello
        cd examples/dreamcast/hello
        make
        
        # Przygotuj pliki do BootDreams
        mkdir -p /workspace/build/disc
        cp 1ST_READ.BIN /workspace/build/disc/
        
        # Pobierz IP.BIN
        wget -O /workspace/build/disc/IP.BIN https://github.com/ps2dev/ip.bin/raw/master/ip.bin
        
        echo "Done!"
        ls -lh /workspace/build/disc/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Ready-Files
        path: build/disc/
