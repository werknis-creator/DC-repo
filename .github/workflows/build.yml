name: Build Dreamcast Game

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Wchodzimy do kontenera, ładujemy środowisko i bezwzględnie wracamy do folderu projektu
      - name: Compile Code inside Container
        run: |
          docker run --rm -v ${{ github.workspace }}:/project -w /project --entrypoint /bin/bash nold360/kallistios-sdk:latest -c "
            echo '=== Ladujemy srodowisko KallistiOS ==='
            if [ -f /opt/toolchains/dc/kos/environ.sh ]; then source /opt/toolchains/dc/kos/environ.sh; fi
            if [ -f /etc/profile.d/kos.sh ]; then source /etc/profile.d/kos.sh; fi
            
            echo '=== Wymuszamy powrot do folderu gry ==='
            cd /project
            
            echo '=== Uruchamiamy kompilacje ==='
            make
            
            echo '=== Podglad plikow wewnatrz kontenera po make ==='
            ls -la
          "

      # Przesyłamy wygenerowany plik binarny
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast_1st_read
          path: 1st_read.bin
