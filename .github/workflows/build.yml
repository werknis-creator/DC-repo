name: Dreamcast Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Docker
      run: docker build -t dc-simple .

    - name: Download IP.BIN
      run: wget -O ip.bin https://github.com/KallistiOS/kos/raw/master/utils/ipbin/ip.bin || dd if=/dev/zero of=ip.bin bs=512 count=1

    - name: Build
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace dc-simple bash -c "
          mkdir -p build && cd build && \
          cmake .. && \
          make && \
          make dist
        "

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-ISO
        path: build/game.iso
