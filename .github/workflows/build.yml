name: Dreamcast GTA-Style Build

on: [push, pull_request]

jobs:
  build-dreamcast:
    runs-on: ubuntu-latest
    # Używamy gotowego obrazu z prekompilowanym toolchainem KallistiOS
    container:
      image: ghcr.io/dcemulation/kos:latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install missing tools
      run: |
        apt-get update
        apt-get install -y cmake genisoimage wget

    - name: Download IP.BIN (boot sector for CD-R)
      run: |
        wget -q -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin

    - name: Configure & Build
      run: |
        # 1. Ładujemy zmienne środowiskowe KallistiOS
        source /opt/toolchains/dc/kos/environ.sh
        
        # 2. Przygotowujemy katalog build
        mkdir -p build && cd build
        
        # 3. Kopiujemy ip.bin do katalogu build (wymagane przez CMake)
        cp ../ip.bin .
        
        # 4. Konfiguracja CMake z toolchainem Dreamcast
        cmake -DCMAKE_TOOLCHAIN_FILE=/opt/toolchains/dc/kos/utils/cmake/toolchain-dreamcast.cmake ..
        
        # 5. Kompilacja
        make -j$(nproc)
        
        # 6. Generowanie ISO
        make dist

    - name: Upload CD-R Image
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-GTA-Style-ISO
        path: build/game.iso
        retention-days: 14
