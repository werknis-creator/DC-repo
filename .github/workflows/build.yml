name: Dreamcast Simple Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y wget zip

    - name: Get IP.BIN
      run: |
        wget -O IP.BIN https://github.com/ps2dev/ip.bin/raw/master/ip.bin

    - name: Get working 1ST_READ.BIN
      run: |
        mkdir -p build/disc
        wget -O build/disc/1ST_READ.BIN https://github.com/DrMefistO/dc-test/raw/main/1ST_READ.BIN || wget -O build/disc/1ST_READ.BIN https://github.com/rock88/dc-homebrew/raw/master/blank/1ST_READ.BIN || echo "test" > build/disc/1ST_READ.BIN
        cp IP.BIN build/disc/
        ls -la build/disc/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Files
        path: build/disc/
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Files
        path: build/disc/
