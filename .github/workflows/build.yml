name: Dreamcast Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake genisoimage wget git

    - name: Download IP.BIN
      run: |
        wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin || \
        dd if=/dev/zero of=ip.bin bs=512 count=1

    - name: Build Game (1ST_READ.BIN)
      run: |
        mkdir -p build/disc
        # Tutaj powinien być prawdziwy 1ST_READ.BIN z gry
        # Na razie tworzymy dummy plik
        echo "dummy" > build/disc/1ST_READ.BIN
        
        # Kopiuj IP.BIN do folderu
        cp ip.bin build/disc/
        
        # Lista plików
        echo "=== Files for BootDreams ==="
        ls -lh build/disc/
        
    - name: Upload Files for BootDreams
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-BootDreams-Files
        path: build/disc/
