name: Dreamcast Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake genisoimage wget git

    - name: Download IP.BIN
      run: |
        wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin || \
        dd if=/dev/zero of=ip.bin bs=512 count=1

    - name: Create Dreamcast CDI
      run: |
        mkdir -p build/disc
        echo "dummy binary" > build/disc/1ST_READ.BIN
        cp ip.bin build/
        cd build
        
        # Tworzenie obrazu CDI dla Dreamcast
        genisoimage -o game.cdi \
                    -G ip.bin \
                    -V "SEGA SEGAKATANA" \
                    -C 0,11702 \
                    -l \
                    -J \
                    -R \
                    -rock \
                    -joliet \
                    disc
        
        # Sprawdź czy plik powstał
        ls -lh game.cdi
        
    - name: Upload CDI
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-CDI
        path: build/game.cdi
