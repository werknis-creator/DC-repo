name: Dreamcast GTA-Style Build

on: [push, pull_request]

jobs:
  build-dreamcast:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t dc-build-env .

    - name: Download IP.BIN
      run: wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin

    - name: Build Game
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace dc-build-env bash -c "
          source /tmp/KallistiOS/environ.sh && \
          mkdir -p build && cd build && \
          cmake -DCMAKE_TOOLCHAIN_FILE=/tmp/KallistiOS/utils/cmake/toolchain-dreamcast.cmake .. && \
          make -j\$(nproc) && \
          make dist
        "

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-GTA-Style-ISO
        path: build/game.iso
