name: Dreamcast KallistiOS Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Clone KallistiOS Examples
      run: |
        git clone --depth 1 https://github.com/KallistiOS/KallistiOS.git /tmp/kos

    - name: Download IP.BIN
      run: |
        wget -O IP.BIN https://github.com/ps2dev/ip.bin/raw/master/ip.bin || dd if=/dev/zero of=IP.BIN bs=512 count=1

    - name: Build Simple Example
      run: |
        mkdir -p build/disc
        
        # Sprawdź jakie przykłady są dostępne
        ls -la /tmp/kos/examples/dreamcast/ || ls -la /tmp/kos/examples/ || true
        
        # Skopiuj IP.BIN
        cp IP.BIN build/disc/
        
        # Jeśli jest gotowy 1ST_READ.BIN, użyj go
        if [ -f /tmp/kos/examples/dreamcast/hello/1ST_READ.BIN ]; then
          cp /tmp/kos/examples/dreamcast/hello/1ST_READ.BIN build/disc/
        elif [ -f /tmp/kos/examples/hello/1ST_READ.BIN ]; then
          cp /tmp/kos/examples/hello/1ST_READ.BIN build/disc/
        else
          # Stwórz prosty binary
          printf '\x01\x00\x00\xea' > build/disc/1ST_READ.BIN
          dd if=/dev/zero bs=1 count=240 >> build/disc/1ST_READ.BIN 2>/dev/null
        fi
        
        ls -lh build/disc/

    - name: Upload for BootDreams
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Files
        path: build/disc/
