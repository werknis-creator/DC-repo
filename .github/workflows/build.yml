name: Build Dreamcast Game

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Wymuszamy wejście przez bash i jawne załadowanie środowiska KallistiOS
      - name: Compile Code inside Container
        run: |
          if [ -f "Makefile" ]; then
            echo "Znaleziono Makefile w folderze glownym."
            docker run --rm --entrypoint /bin/bash -v ${{ github.workspace }}:/project -w /project nold360/kallistios-sdk:latest -c "source /opt/toolchains/dc/kos/environ.sh 2>/dev/null || true; make"
          elif [ -f ".devcontainer/Makefile" ]; then
            echo "Znaleziono Makefile w folderze .devcontainer."
            docker run --rm --entrypoint /bin/bash -v ${{ github.workspace }}:/project -w /project/.devcontainer nold360/kallistios-sdk:latest -c "source /opt/toolchains/dc/kos/environ.sh 2>/dev/null || true; make"
          else
            echo "Blad: Nie znaleziono pliku Makefile!" && exit 1
          fi

      # Krok diagnostyczny - pokaże w logach, co dokładnie wypluł kompilator
      - name: Debug - List files after build
        run: |
          echo "=== Pliki w folderze glownym ==="
          ls -la
          echo "=== Pliki w folderze .devcontainer ==="
          ls -la .devcontainer || echo "Brak folderu .devcontainer"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast_1st_read
          path: |
            1st_read.bin
            .devcontainer/1st_read.bin
        if: always()
