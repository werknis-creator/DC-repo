name: Dreamcast Real Binary Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Download Verified Dreamcast Files
      run: |
        mkdir -p build/disc
        
        # 1. Prawdziwy, skompilowany 1ST_READ.BIN z oficjalnych przykładów KOS
        wget -O build/disc/1ST_READ.BIN \
          https://github.com/KallistiOS/kos/raw/master/examples/hello/1ST_READ.BIN
        
        # 2. Prawdziwy IP.BIN z narzędzi KOS
        wget -O build/disc/IP.BIN \
          https://github.com/KallistiOS/kos/raw/master/utils/ipbin/IP.BIN
        
        # Sprawdź czy pliki są prawdziwe (powinny zaczynać się od kodu SH4)
        echo "=== Verifying 1ST_READ.BIN ==="
        file build/disc/1ST_READ.BIN
        xxd build/disc/1ST_READ.BIN | head -3
        
        echo "=== Verifying IP.BIN ==="
        file build/disc/IP.BIN
        ls -lh build/disc/
        
    - name: Upload for BootDreams
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Real-Files
        path: build/disc/
