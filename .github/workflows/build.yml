name: Build Dreamcast Game

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: nold360/kallistios-sdk:latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile
        run: make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast_1st_read
          path: 1st_read.bin
