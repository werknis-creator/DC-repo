name: Dreamcast Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake genisoimage wget git

    - name: Download KallistiOS
      run: |
        cd /tmp
        git clone --depth 1 https://github.com/KallistiOS/KallistiOS.git
        echo "KOS_BASE=/tmp/KallistiOS" >> $GITHUB_ENV

    - name: Download IP.BIN
      run: |
        wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin || \
        dd if=/dev/zero of=ip.bin bs=512 count=1

    - name: Create Dreamcast CDI
      run: |
        mkdir -p build/disc
        echo "dummy binary" > build/disc/1ST_READ.BIN
        cp ip.bin build/
        cd build
        
        # Tworzenie obrazu z właściwymi parametrami dla Dreamcast
        mkisofs -C 0,11702 \
                -V "SEGA SEGAKATANA" \
                -G ip.bin \
                -joliet \
