name: Build Dreamcast Game

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Uruchamiamy powłokę logowania (bash -l), która automatycznie konfiguruje środowisko KallistiOS
      - name: Compile Code inside Container
        run: |
          if [ -f "Makefile" ]; then
            echo "Znaleziono Makefile w folderze glownym."
            docker run --rm -v ${{ github.workspace }}:/project -w /project --entrypoint /bin/bash nold360/kallistios-sdk:latest -l -c "make"
          elif [ -f ".devcontainer/Makefile" ]; then
            echo "Znaleziono Makefile w folderze .devcontainer."
            docker run --rm -v ${{ github.workspace }}:/project -w /project/.devcontainer --entrypoint /bin/bash nold360/kallistios-sdk:latest -l -c "make"
          else
            echo "Blad: Nie znaleziono pliku Makefile!" && exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast_1st_read
          path: |
            1st_read.bin
            .devcontainer/1st_read.bin
