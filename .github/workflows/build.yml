name: Dreamcast GTA-Style Build

on: [push, pull_request]

jobs:
  build-dreamcast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup KallistiOS
      uses: ps2dev/setup-kos@v1
      with:
        kos-version: 'latest'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake genisoimage

    - name: Download IP.BIN
      run: |
        wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin

    - name: Build Game
      run: |
        source $KOS_BASE/environ.sh
        mkdir -p build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=$KOS_BASE/utils/cmake/toolchain-dreamcast.cmake ..
        make -j$(nproc)
        make dist

    - name: Upload CD-R Image
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-GTA-Style-ISO
        path: build/game.iso
        retention-days: 14
