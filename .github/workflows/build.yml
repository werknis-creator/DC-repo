name: Dreamcast Working Binary

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Create Working Files
      run: |
        mkdir -p build/disc
        
        # Stwórz minimalny binary SH4
        printf '\x01\x00\x00\x00' > build/disc/1ST_READ.BIN
        printf '\xfe\xff\x09\x00' >> build/disc/1ST_READ.BIN
        dd if=/dev/zero bs=1 count=504 >> build/disc/1ST_READ.BIN 2>/dev/null
        
        # Pobierz IP.BIN
        wget -q -O build/disc/IP.BIN https://github.com/ps2dev/ip.bin/raw/master/ip.bin
        
        ls -lh build/disc/

    - name: Upload for BootDreams
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Files
        path: build/disc/
