name: Dreamcast GTA-Style Build

on: [push, pull_request]

jobs:
  build-dreamcast:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image with KallistiOS
      run: docker build -t dc-build-env .
      # To zajmie ~30-40 minut przy pierwszym buildzie, potem będzie cache

    - name: Download IP.BIN
      run: |
        wget -q -O ip.bin https://github.com/KallistiOS/kos/raw/master/utils/ipbin/ip.bin || \
        dd if=/dev/zero of=ip.bin bs=512 count=1

    - name: Build Game
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace dc-build-env bash -c "
          source /opt/KallistiOS/environ.sh && \
          mkdir -p build && cd build && \
          cmake -DCMAKE_TOOLCHAIN_FILE=/opt/KallistiOS/utils/cmake/toolchain-dreamcast.cmake .. && \
          make -j\$(nproc) && \
          make dist
        "

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-GTA-Style-ISO
        path: build/game.iso
