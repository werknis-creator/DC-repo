name: Dreamcast Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dreamcast Toolchain from Ubuntu repos
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-sh4-elf \
          binutils-sh4-elf \
          cmake \
          genisoimage \
          make \
          git \
          wget

    - name: Download KallistiOS
      run: |
        cd /tmp
        git clone --depth 1 https://github.com/KallistiOS/KallistiOS.git
        echo "KOS_BASE=/tmp/KallistiOS" >> $GITHUB_ENV

    - name: Download IP.BIN
      run: wget -O ip.bin https://github.com/KallistiOS/kos/raw/master/utils/ipbin/ip.bin || dd if=/dev/zero of=ip.bin bs=512 count=1

    - name: Build Game
      run: |
        mkdir -p build && cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=$KOS_BASE/utils/cmake/dreamcast.cmake ..
        make -j$(nproc)
        make dist

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-ISO
        path: build/game.iso
