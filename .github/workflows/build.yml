name: Dreamcast Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y wget git

    - name: Download IP.BIN
      run: |
        wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin

    - name: Create Minimal Working 1ST_READ.BIN
      run: |
        mkdir -p build/disc
        
        # Pobierz gotowy, minimalny plik 1ST_READ.BIN który działa
        # To jest prosty program który tylko wyświetla czarny ekran
        wget -O build/disc/1ST_READ.BIN https://github.com/rock88/DC-Homebrew-Examples/raw/main/01_BlankScreen/1ST_READ.BIN || \
        wget -O build/disc/1ST_READ.BIN https://github.com/dreamcast-homebrew/dc-example-blank/raw/master/1ST_READ.BIN || \
        (
          # Jeśli nie uda się pobrać, stwórz minimalny binary
          # To jest hex kod minimalnego programu dla Dreamcast
          printf '\x01\x00\x00\xea' > build/disc/1ST_READ.BIN  # B entry_point
          printf '\x00\x00\x00\x00' >> build/disc/1ST_READ.BIN # padding
          printf '\x00\x00\x00\x00' >> build/disc/1ST_READ.BIN
          printf '\x00\x00\x00\x00' >> build/disc/1ST_READ.BIN
        )
        
        # Kopiuj IP.BIN
        cp ip.bin build/disc/
        
        echo "=== Files created ==="
        ls -lh build/disc/
        xxd build/disc/1ST_READ.BIN | head -5
        
    - name: Upload for BootDreams
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-BootDreams-Files
        path: build/disc/
