name: Build Dreamcast Game

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Logujemy się (aby załadować środowisko) i od razu przechodzimy do /project przed wywołaniem make
      - name: Compile Code inside Container
        run: |
          if [ -f "Makefile" ]; then
            echo "Znaleziono Makefile w folderze glownym."
            docker run --rm -v ${{ github.workspace }}:/project -w /project --entrypoint /bin/bash nold360/kallistios-sdk:latest -l -c "cd /project && make"
          elif [ -f ".devcontainer/Makefile" ]; then
            echo "Znaleziono Makefile w folderze .devcontainer."
            docker run --rm -v ${{ github.workspace }}:/project -w /project/.devcontainer --entrypoint /bin/bash nold360/kallistios-sdk:latest -l -c "cd /project/.devcontainer && make"
          else
            echo "Blad: Nie znaleziono pliku Makefile!" && exit 1
          fi

      # Ten krok wywołuje się tylko, gdy powyższe 'make' stworzy plik z pełnym sukcesem
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast_1st_read
          path: |
            1st_read.bin
            .devcontainer/1st_read.bin
