name: Dreamcast GTA-Style Build

on: [push, pull_request]

jobs:
  build-dreamcast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Dreamcast Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake genisoimage make git wget
        
    - name: Download IP.BIN
      run: |
        wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin

    - name: Build using Docker
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace \
          bluecrabab/dc-kos-toolchain:latest \
          bash -c "
            source /opt/toolchains/dc/kos/environ.sh && \
            mkdir -p build && cd build && \
            cmake -DCMAKE_TOOLCHAIN_FILE=/opt/toolchains/dc/kos/utils/cmake/toolchain-dreamcast.cmake .. && \
            make -j\$(nproc) && \
            make dist
          "

    - name: Upload CD-R Image
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-GTA-Style-ISO
        path: build/game.iso
        retention-days: 14
