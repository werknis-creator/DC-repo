name: Dreamcast Working Binary

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Create Working Files with Python
      run: |
        mkdir -p build/disc
        
        # Stwórz minimalny, działający binary dla SH4 używając Pythona
        python3 << 'EOF'
import struct

# Minimalny kod SH4 - pusta pętla
# To jest prawdziwy kod maszynowy dla procesora SH4
code = bytes([
    0x01, 0x00,  # mov #1, r0
    0x00, 0x00,  # nop
    0xfe, 0xff,  # bra .-2 (nieskończona pętla)
    0x09, 0x00,  # delay slot
])

# Dodaj padding do minimum 512 bajtów
padding = b'\x00' * (512 - len(code))
binary = code + padding

# Zapisz
with open('build/disc/1ST_READ.BIN', 'wb') as f:
    f.write(binary)

print(f"Created 1ST_READ.BIN: {len(binary)} bytes")
EOF

        # Pobierz IP.BIN
        wget -q -O build/disc/IP.BIN https://github.com/ps2dev/ip.bin/raw/master/ip.bin || \
        python3 -c "open('build/disc/IP.BIN','wb').write(b'\x00'*512)"
        
        echo "Files created:"
        ls -lh build/disc/
        xxd build/disc/1ST_READ.BIN | head -2

    - name: Upload for BootDreams
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Files
        path: build/disc/
