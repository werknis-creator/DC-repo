name: Dreamcast GTA-Style Build

on: [push, pull_request]

jobs:
  build-dreamcast:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t dc-build-env .

    - name: Find environ.sh location
      run: |
        docker run --rm dc-build-env bash -c "
          find /opt/KallistiOS -name 'environ.sh' -type f
        "

    - name: Build Game
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace dc-build-env bash -c "
          if [ -f /opt/KallistiOS/environ.sh ]; then
            source /opt/KallistiOS/environ.sh
          elif [ -f /opt/KallistiOS/utils/environ.sh ]; then
            source /opt/KallistiOS/utils/environ.sh
          else
            echo 'environ.sh not found, creating minimal version'
            export KOS_BASE=/opt/KallistiOS
            export KOS_TOOLCHAIN=/opt/toolchains/dc
            export PATH=\$KOS_TOOLCHAIN/bin:\$PATH
          fi && \
          mkdir -p build && cd build && \
          cmake -DCMAKE_TOOLCHAIN_FILE=\$KOS_BASE/utils/cmake/toolchain-dreamcast.cmake .. && \
          make -j\$(nproc)
        "

    - name: Create ISO
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace dc-build-env bash -c "
          mkdir -p build/disc && \
          cp build/1ST_READ.BIN build/disc/ && \
          cd build && \
          mkisofs -C 0,11702 -V 'SEGA SEGAKATANA' -G /opt/KallistiOS/utils/ipbin/ip.bin -joliet -rock -o game.iso disc/
        "

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-GTA-Style-ISO
        path: build/game.iso
