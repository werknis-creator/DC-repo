name: Dreamcast Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake genisoimage wget git

    - name: Download IP.BIN
      run: |
        wget -O ip.bin https://raw.githubusercontent.com/KallistiOS/kos/master/utils/ipbin/ip.bin || \
        dd if=/dev/zero of=ip.bin bs=512 count=1

    - name: Create Dreamcast Disc Structure
      run: |
        mkdir -p build/disc
        # Tutaj powinien być prawdziwy 1ST_READ.BIN
        echo "dummy" > build/disc/1ST_READ.BIN
        cp ip.bin build/
        
        cd build
        
        # Tworzenie bootowalnego obrazu ISO dla Dreamcast
        genisoimage -o game.iso \
                    -G ip.bin \
                    -V "SEGA SEGAKATANA" \
                    -C 0,11702 \
                    -l \
                    -J \
                    -R \
                    -iso-level 4 \
                    disc/
        
        # Konwersja ISO na CDI używając cdi4dc
        wget -O cdi4dc https://github.com/andrewj/raspberry-pi-dreamcast-cdi-builder/raw/master/cdi4dc
        chmod +x cdi4dc
        ./cdi4dc game.iso game.cdi "Dreamcast Game"
        
        # Sprawdź pliki
        ls -lh *.iso *.cdi
        
    - name: Upload CDI
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-CDI
        path: build/game.cdi
