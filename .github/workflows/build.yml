name: Dreamcast Working Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install Dreamcast Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-sh4-elf \
          binutils-sh4-elf \
          wget \
          zip

    - name: Download IP.BIN
      run: |
        wget -O IP.BIN https://github.com/dreamcast-archives/dc-ip.bin/raw/main/ip.bin || \
        wget -O IP.BIN https://github.com/ps2dev/ip.bin/raw/master/ip.bin || \
        (dd if=/dev/zero of=IP.BIN bs=512 count=1 && echo "SEGA SEGAKATANA" | dd of=IP.BIN conv=notrunc 2>/dev/null)
        
        echo "IP.BIN downloaded:"
        ls -lh IP.BIN

    - name: Create Minimal Working Binary
      run: |
        mkdir -p build/disc
        
        # Stwórz minimalny kod asemblera SH4
        cat > startup.S << 'EOF'
.global _start
_start:
    ! Prosty program - pusta pętla
    bra .
    nop
EOF
        
        # Linker script dla Dreamcast
        cat > linker.ld << 'EOF'
ENTRY(_start)
SECTIONS
{
    . = 0x8c010000;
    .text : { *(.text*) }
    .data : { *(.data*) }
    .bss : { *(.bss*) }
}
EOF
        
        # Kompilacja
        sh4-elf-as startup.S -o startup.o
        sh4-elf-ld -T linker.ld startup.o -o 1ST_READ.elf
        sh4-elf-objcopy -O binary 1ST_READ.elf build/disc/1ST_READ.BIN
        
        # Kopiuj IP.BIN
        cp IP.BIN build/disc/
        
        echo "=== Created files ==="
        ls -lh build/disc/
        echo "=== First bytes of 1ST_READ.BIN ==="
        xxd build/disc/1ST_READ.BIN | head -3
        
    - name: Upload for BootDreams
      uses: actions/upload-artifact@v4
      with:
        name: Dreamcast-Files
        path: build/disc/
