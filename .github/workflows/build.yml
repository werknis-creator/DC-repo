name: Build Dreamcast Game

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Czyste uruchomienie 'make' przy użyciu fabrycznych zmiennych środowiskowych kontenera
      - name: Compile Code inside Container
        run: |
          if [ -f "Makefile" ]; then
            echo "Znaleziono Makefile w folderze glownym."
            docker run --rm -v ${{ github.workspace }}:/project -w /project --entrypoint "" nold360/kallistios-sdk:latest make
          elif [ -f ".devcontainer/Makefile" ]; then
            echo "Znaleziono Makefile w folderze .devcontainer."
            docker run --rm -v ${{ github.workspace }}:/project -w /project/.devcontainer --entrypoint "" nold360/kallistios-sdk:latest make
          else
            echo "Blad: Nie znaleziono pliku Makefile!" && exit 1
          fi

      # Ten krok uruchomi się tylko wtedy, gdy kompilacja powyżej zakończy się pełnym sukcesem
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast_1st_read
          path: |
            1st_read.bin
            .devcontainer/1st_read.bin
